; Smart Chessboard - firmware (reed-switch 8x8 matrix bringup / diagnostic)
; Stack: PlatformIO + ESP-IDF  (see ../context/foundation/tech-stack.md)
;
; Board id `esp32dev` == classic ESP32-WROOM-32 DevKitC. SWAP if your module
; differs (e.g. esp32-s3-devkitc-1). List options with: `pio boards espressif32`.

; Keep a bare `pio run` (no -e) scoped to the device build only. The `native`
; env below builds nothing from src/ (host tests only); listing it in
; default_envs would make `pio run` try to compile the ESP-IDF main.cpp on the
; host and fail. Build/run host tests explicitly with `pio test -e native`.
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

monitor_speed = 115200
; esp32_exception_decoder turns guru-meditation crashes into readable backtraces
monitor_filters = esp32_exception_decoder, time

build_flags =
    -Wall
    -Wextra

; If port auto-detect picks wrong, pin it (find via `pio device list`):
; upload_port = /dev/cu.usbserial-0001
; monitor_port = /dev/cu.usbserial-0001
;
; If a clone won't connect at the default 460800 baud, slow the upload:
; upload_speed = 115200

; ---------------------------------------------------------------------------
;  Host test environment — runs the pure firmware/lib/ logic on the dev machine
;  with Unity, asserting the §1.3/§1.4 wire codec against the same golden byte
;  vectors as the Kotlin BoardWireCodecTest.kt. No ESP-IDF, NimBLE, or GPIO.
;
;    pio test -e native
;
;  src/main.cpp (ESP-IDF) is excluded from the host binary — test_build_src
;  defaults to false, so only test/ + the lib/ deps the tests #include compile.
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -Wall
    -Wextra
