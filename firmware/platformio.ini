; Smart Chessboard - firmware (reed-switch 8x8 matrix bringup / diagnostic)
; Stack: PlatformIO + ESP-IDF  (see ../context/foundation/tech-stack.md)
;
; Board id `esp32dev` == classic ESP32-WROOM-32 DevKitC. SWAP if your module
; differs (e.g. esp32-s3-devkitc-1). List options with: `pio boards espressif32`.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

monitor_speed = 115200
; esp32_exception_decoder turns guru-meditation crashes into readable backtraces
monitor_filters = esp32_exception_decoder, time

build_flags =
    -Wall
    -Wextra

; If port auto-detect picks wrong, pin it (find via `pio device list`):
; upload_port = /dev/cu.usbserial-0001
; monitor_port = /dev/cu.usbserial-0001
;
; If a clone won't connect at the default 460800 baud, slow the upload:
; upload_speed = 115200
